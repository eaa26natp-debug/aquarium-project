<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akvarium backup</title>
    <link rel="stylesheet" href="css/style.css" />
    <link
      href="https://fonts.googleapis.com/css?family=Baloo Thambi 2"
      rel="stylesheet"
    />
  </head>
  <body>
    <audio id="bg-sound" src="sound/water-noises.mp3" loop></audio>

    <div id="fiske-popup" class="fiske-popup popup-hidden">
      <img
        src="imges/section-background.png"
        alt="popup background"
        class="popup-boble"
      />

      <div class="popup-indhold">
        <h2 id="popup-navn"></h2>
        <p id="popup-latin"></p>
        <p id="popup-tekst"></p>

        <div class="popup-knapper">
          <button class="popup-knap" onclick="showSection('habitat')">
            <img src="imges/icons/info-icons/global-icon.svg" alt="habitat" />
          </button>
          <button class="popup-knap" onclick="showSection('laes-mere')">
            <img src="imges/icons/info-icons/info-icon.svg" alt="læs mere" />
          </button>
          <button class="popup-knap" onclick="showSection('mad')">
            <img src="imges/icons/info-icons/food-icon.svg" alt="mad" />
          </button>
        </div>
      </div>
      <button class="go-back">tilbage</button>
    </div>

    <!-- Food popup for fish -->
    <section id="food-popup" class="fiske-popup popup-hidden">
      <img
        src="imges/section-background.png"
        alt="popup background"
        class="popup-boble"
      />
      <div class="popup-indhold">
        <h2>Animal</h2>
        <div class="foods">
          <p>food1</p>
          <p>food1</p>
          <p>food1</p>
        </div>
        <p>
          Lorem ipsum dolor, sit amet consectetur adipisicing elit. Ut eius
          tempora ipsa animi? Sunt vitae, obcaecati, autem ab sint ex, fugiat
          recusandae libero dolor iusto nihil at ratione commodi vel.
        </p>
        <button class="go-back">tilbage</button>
      </div>
    </section>

    <div class="allFish">
      <img
        src="imges/fish/lyrehale.gif"
        alt="lyrehale"
        class="fish1"
        id="fisk-lyrehale"
      />

      <div class="fishGroup" id="fiske-gruppe">
        <img
          class="fish2"
          id="fishA"
          src="imges/fish/drakpurplefish.gif"
          alt="mørkelilla/blå fisk"
        />
        <img
          class="fish2"
          id="fishB"
          src="imges/fish/purplefish.gif"
          alt="lilla fisk"
        />
        <img
          class="fish2"
          id="fishC"
          src="imges/fish/orangefish.gif"
          alt="orange fisk"
        />
        <img
          class="fish2"
          id="fishD"
          src="imges/fish/bluefish.gif"
          alt="blå fisk"
        />
        <img
          class="fish2"
          id="fishE"
          src="imges/fish/redfish.gif"
          alt="rød fisk"
        />
        <img
          class="fish2"
          id="fishF"
          src="imges/fish/greenfish.gif"
          alt="grøn fisk"
        />
      </div>

      <img
        src="imges/fish/gul-kirugfisk.gif"
        alt="Gul kirurgfisk"
        class="fish3"
        id="fisk-gul-kirugfisk"
      />
      <img
        src="imges/fish/paletkirugfisk.gif"
        alt="Paletkirurgfisk"
        class="fish4"
        id="fisk-paletkirugfisk"
      />
      <img
        src="imges/fish/eeal.gif"
        alt="Europæisk ål"
        class="fish5"
        id="fisk-eeal"
      />
      <img
        src="imges/fish/mahdi-fish.gif"
        alt="royal gramma"
        class="fish6"
        id="fisk-royal-gramma"
      />
    </div>

    <img
      src="imges/decorations/buble-coral.png"
      alt="Bobbel Koral"
      id="bubleCoral"
    />
    <img
      src="imges/decorations/tang-green.png"
      alt="Grøn tang"
      id="greenTang"
    />
    <img src="imges/decorations/red-coral.png" alt="Rød koral" id="redCoral" />

    <img id="bubble1" src="imges/bubble/bubble.png" alt="bobble" />
    <img src="imges/bubble/bobbel-lil2.png" alt="lille bobble" />

    <img
      id="backBtn"
      src="imges/bobbel-lil2.png"
      alt="back"
      style="cursor: pointer"
    />

    <script src="js/script.js"></script>
  </body>
</html>
