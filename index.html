<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Akvarium backup</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <audio id="bg-sound" src="sound/water-noises.mp3" loop></audio>

    <div id="fiske-popup" class="popup-hidden">
      <img
        src="imges/section-background.png"
        alt="popup background"
        class="popup-boble"
      />
      <!-- Tekst-indholdet ligger OVEN PÅ boble-billedet. -->
      <div class="popup-indhold">
        <h2 id="popup-navn"></h2>
        <p id="popup-latin"></p>
        <p id="popup-tekst"></p>
      </div>
    </div>

    <div class="allFish">
      <img
        src="imges/fish/lyrehale.gif"
        alt="lyrehale"
        class="fish1"
        id="fisk-lyrehale"
      />

      <div class="fishGroup" id="fiske-gruppe">
        <img
          class="fish2"
          id="fishA"
          src="imges/fish/drakpurplefish.gif"
          alt="mørkelilla/blå fisk"
        />
        <img
          class="fish2"
          id="fishB"
          src="imges/fish/purplefish.gif"
          alt="lilla fisk"
        />
        <img
          class="fish2"
          id="fishC"
          src="imges/fish/orangefish.gif"
          alt="orange fisk"
        />
        <img class="fish2" id="fishD" src="imges/fish/bluefish.gif" alt="blå fisk" />
        <img class="fish2" id="fishE" src="imges/fish/redfish.gif" alt="rød fisk" />
        <img
          class="fish2"
          id="fishF"
          src="imges/fish/greenfish.gif"
          alt="grøn fisk"
        />
      </div>

      <img
        src="imges/fish/gul-kirugfisk.gif"
        alt="Gul kirurgfisk"
        class="fish3"
        id="fisk-gul-kirugfisk"
      />
      <img
        src="imges/fish/paletkirugfisk.gif"
        alt="Paletkirurgfisk"
        class="fish4"
        id="fisk-paletkirugfisk"
      />
      <img
        src="imges/fish/eeal.gif"
        alt="Europæisk ål"
        class="fish5"
        id="fisk-eeal"
      />
      <img
        src="imges/fish/mahdi-fisk.png"
        alt="royal gramma"
        class="fish6"
        id="fisk-royal-gramma"
      />
    </div>

    <!-- <img id="bubble1" src="imges/bubble/bubble.png" alt="bobble" />
    <img id="bubble2" src="imges/bubble/bubble.png" alt="bobble2" /> -->
    <img src="imges/icons/bobbel-lil2.png" alt="lille bobble" />

    <!-- Food popup for fish -->
    <section id="food-popup">
      <h2>Animal</h2>
      <div class="foods">
        <p>food1</p>
        <p>food1</p>
        <p>food1</p>
      </div>
      <p>
        Lorem ipsum dolor, sit amet consectetur adipisicing elit. Ut eius
        tempora ipsa animi? Sunt vitae, obcaecati, autem ab sint ex, fugiat
        recusandae libero dolor iusto nihil at ratione commodi vel.
      </p>
    </section>

    <img id="backBtn" src="imges/bobbel-lil2.png" alt="back" style="cursor:pointer;">
    

    <script src="js/script.js"></script>
  </body>
</html>
